<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIBI — 코인 안전진단</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #eeeef5;
  --text2: #8888aa;
  --text3: #44445a;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00cec9;
  --green-bg: rgba(0,206,201,0.1);
  --yellow: #fdcb6e;
  --yellow-bg: rgba(253,203,110,0.1);
  --red: #ff7675;
  --red-bg: rgba(255,118,117,0.1);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Pretendard', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(108,92,231,0.12), transparent);
  pointer-events: none; z-index: 0;
}
.wrap { max-width: 560px; margin: 0 auto; padding: 3rem 1.25rem 4rem; position: relative; z-index: 1; }

/* 헤더 */
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; }
.logo-mark { width: 34px; height: 34px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; }
.logo-name { font-size: 14px; font-weight: 600; color: var(--text); }
.logo-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 1.5px; text-transform: uppercase; display: block; }
h1 { font-size: clamp(2.2rem, 6vw, 3.2rem); font-weight: 700; line-height: 1.1; letter-spacing: -1px; margin-bottom: 0.75rem; }
h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.sub { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 2rem; }

/* 검색 */
.search { position: relative; margin-bottom: 0.75rem; }
.search input {
  width: 100%; padding: 15px 120px 15px 18px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 13px; color: var(--text); font-size: 15px; font-family: var(--sans);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,92,231,0.15); }
.search input::placeholder { color: var(--text3); }
.search button {
  position: absolute; right: 7px; top: 7px; bottom: 7px;
  padding: 0 18px; background: var(--accent); border: none; border-radius: 9px;
  color: #fff; font-size: 13px; font-weight: 600; font-family: var(--sans); cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.search button:hover { background: var(--accent2); }
.search button:active { transform: scale(0.97); }

.tags { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 2rem; }
.tag {
  padding: 5px 13px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; font-size: 11px; color: var(--text2); cursor: pointer;
  font-family: var(--mono); transition: all 0.15s;
}
.tag:hover { border-color: var(--accent); color: var(--accent2); background: rgba(108,92,231,0.08); }

/* 로딩 */
.loading { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 3rem; }
.loading.show { display: flex; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 12px; color: var(--text2); font-family: var(--mono); }

.error { display: none; padding: 1rem 1.25rem; background: var(--red-bg); border: 1px solid rgba(255,118,117,0.2); border-radius: 11px; color: var(--red); font-size: 13px; margin-bottom: 1rem; }
.error.show { display: block; }

/* 결과 */
.result { display: none; }
.result.show { display: block; animation: up 0.35s ease; }
@keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; }

/* 점수 헤더 */
.score-row { display: flex; align-items: center; gap: 18px; }
.ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.ring svg { transform: rotate(-90deg); }
.ring-txt { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-num { font-size: 22px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.ring-den { font-size: 9px; color: var(--text3); font-family: var(--mono); }
.score-info { flex: 1; }
.coin-title { font-size: 19px; font-weight: 700; margin-bottom: 5px; }
.risk-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: var(--mono); margin-bottom: 5px; }
.risk-pill.low { background: var(--green-bg); color: var(--green); }
.risk-pill.mid { background: var(--yellow-bg); color: var(--yellow); }
.risk-pill.high { background: var(--red-bg); color: var(--red); }
.coin-desc { font-size: 12px; color: var(--text2); line-height: 1.55; }

/* 섹션 타이틀 */
.sec-title { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 체크리스트 */
.checks { display: flex; flex-direction: column; gap: 9px; }
.chk { display: flex; align-items: flex-start; gap: 9px; font-size: 13px; color: var(--text); line-height: 1.5; }
.chk-icon { width: 18px; height: 18px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.chk-icon.ok { background: var(--green-bg); color: var(--green); }
.chk-icon.warn { background: var(--yellow-bg); color: var(--yellow); }
.chk-icon.bad { background: var(--red-bg); color: var(--red); }

/* 메트릭 */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.met { background: var(--surface2); border-radius: 10px; padding: 11px 13px; }
.met-label { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-bottom: 3px; }
.met-val { font-size: 14px; font-weight: 600; font-family: var(--mono); }
.met-val.up { color: var(--green); }
.met-val.down { color: var(--red); }

/* 공유 */
.share { width: 100%; padding: 13px; background: transparent; border: 1px solid var(--border2); border-radius: 11px; color: var(--text); font-size: 13px; font-weight: 600; font-family: var(--sans); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; margin-top: 0.5rem; }
.share:hover { background: var(--surface); border-color: var(--accent); color: var(--accent2); }

/* 푸터 */
.footer { margin-top: 2.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.footer-txt { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.powered { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.powered a { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">K</div>
    <div>
      <div class="logo-name">KIBI Intelligence</div>
      <span class="logo-sub">Coin Safety Scanner</span>
    </div>
  </div>

  <h1>내 코인,<br><em>안전한가요?</em></h1>
  <p class="sub">코인 이름을 입력하면 시가총액, 유동성, 개발 활동, 변동성을 실시간 분석해드려요.</p>

  <div class="search">
    <input id="inp" placeholder="BTC, Ethereum, PEPE, 솔라나..." onkeydown="if(event.key==='Enter')go()"/>
    <button onclick="go()">진단하기</button>
  </div>

  <div class="tags">
    <div class="tag" onclick="q('bitcoin')">BTC</div>
    <div class="tag" onclick="q('ethereum')">ETH</div>
    <div class="tag" onclick="q('solana')">SOL</div>
    <div class="tag" onclick="q('ripple')">XRP</div>
    <div class="tag" onclick="q('pepe')">PEPE</div>
    <div class="tag" onclick="q('dogecoin')">DOGE</div>
  </div>

  <div class="error" id="err"></div>
  <div class="loading" id="load"><div class="spinner"></div><div class="loading-txt" id="ltxt">데이터 조회 중...</div></div>

  <div class="result" id="res">
    <div class="card">
      <div class="score-row">
        <div class="ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none" stroke="#16162a" stroke-width="6"/>
            <circle cx="40" cy="40" r="34" fill="none" id="arc" stroke="#6c5ce7" stroke-width="6" stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="214"/>
          </svg>
          <div class="ring-txt"><div class="ring-num" id="rnum">—</div><div class="ring-den">/100</div></div>
        </div>
        <div class="score-info">
          <div class="coin-title" id="ctitle">—</div>
          <div class="risk-pill low" id="rpill">분석 중</div>
          <div class="coin-desc" id="cdesc"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec-title"><div class="live-dot"></div> 안전 체크리스트</div>
      <div class="checks" id="chks"></div>
    </div>

    <div class="card">
      <div class="sec-title">주요 지표</div>
      <div class="metrics" id="mets"></div>
    </div>

    <button class="share" onclick="doShare()">X (트위터)에 결과 공유하기 ↗</button>
  </div>

  <div class="footer">
    <div class="footer-txt">© 2026 KIBI Intelligence — 투자 권유 아님</div>
    <div class="powered">Powered by <a href="https://coingecko.com">CoinGecko</a></div>
  </div>
</div>
<script>
function q(id){ document.getElementById('inp').value=id; go(); }

async function go(){
  const raw = document.getElementById('inp').value.trim();
  if(!raw) return;
  showLoad('코인 검색 중...'); hideErr(); hideRes();
  try {
    // 1. 검색
    setLtxt('코인 검색 중...');
    const sr = await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(raw)}`);
    const sd = await sr.json();
    if(!sd.coins||!sd.coins.length) throw new Error('코인을 찾을 수 없어요. 영문 이름으로 검색해보세요.');
    const coin = sd.coins[0];

    // 2. 상세 데이터
    setLtxt(`${coin.name} 분석 중...`);
    const dr = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}?localization=false&tickers=false&market_data=true&community_data=true&developer_data=true`);
    if(!dr.ok) throw new Error('데이터 조회 실패. 잠시 후 다시 시도해주세요.');
    const d = await dr.json();

    render(d);
    hideLoad(); showRes();
  } catch(e){ hideLoad(); showErr(e.message||'오류가 발생했어요.'); }
}

function calcScore(d){
  let s = 50;
  const md = d.market_data || {};
  const mc = md.market_cap?.usd || 0;
  const vol = md.total_volume?.usd || 0;
  const price = md.current_price?.usd || 0;
  const gh = d.developer_data || {};
  const stars = gh.stars || 0;
  const commits = gh.commit_count_4_weeks || 0;
  const twitter = d.community_data?.twitter_followers || 0;
  const age = d.genesis_date ? (Date.now()-new Date(d.genesis_date))/(1000*60*60*24*365) : 0;
  const change24 = md.price_change_percentage_24h || 0;
  const change7d = md.price_change_percentage_7d || 0;
  const ath_down = md.ath_change_percentage?.usd || 0;

  // 시가총액 (최대 25점)
  if(mc>100e9) s+=25;
  else if(mc>10e9) s+=18;
  else if(mc>1e9) s+=12;
  else if(mc>100e6) s+=5;
  else if(mc>10e6) s-=5;
  else if(mc>0) s-=15;
  else s-=20;

  // 유동성 (최대 15점)
  const volRatio = mc>0 ? vol/mc : 0;
  if(volRatio>0.1) s+=15;
  else if(volRatio>0.05) s+=10;
  else if(volRatio>0.02) s+=5;
  else if(volRatio<0.005) s-=10;

  // 개발활동 (최대 15점)
  if(stars>10000) s+=15;
  else if(stars>3000) s+=10;
  else if(stars>500) s+=5;
  else if(stars===0) s-=10;
  if(commits>100) s+=5;
  else if(commits>20) s+=2;

  // 운영기간 (최대 10점)
  if(age>7) s+=10;
  else if(age>4) s+=7;
  else if(age>2) s+=4;
  else if(age>1) s+=1;
  else if(age<0.5) s-=10;

  // 변동성 (최대 -15점)
  if(Math.abs(change24)>30) s-=15;
  else if(Math.abs(change24)>15) s-=8;
  else if(Math.abs(change24)>8) s-=3;

  // 커뮤니티
  if(twitter>1000000) s+=5;
  else if(twitter>100000) s+=3;
  else if(twitter>10000) s+=1;

  return Math.max(5, Math.min(97, Math.round(s)));
}

function render(d){
  const md = d.market_data || {};
  const mc = md.market_cap?.usd || 0;
  const vol = md.total_volume?.usd || 0;
  const price = md.current_price?.usd || 0;
  const change24 = md.price_change_percentage_24h;
  const change7d = md.price_change_percentage_7d;
  const gh = d.developer_data || {};
  const age = d.genesis_date ? Math.floor((Date.now()-new Date(d.genesis_date))/(1000*60*60*24*365)) : null;
  const score = calcScore(d);
  const risk = score>=70?'low':score>=45?'mid':'high';
  const name = `${d.name} (${(d.symbol||'').toUpperCase()})`;

  // 링 색상
  const col = risk==='low'?'#00cec9':risk==='mid'?'#fdcb6e':'#ff7675';
  const arc = document.getElementById('arc');
  arc.style.stroke = col;
  arc.style.strokeDashoffset = 214 - (score/100)*214;

  const rnum = document.getElementById('rnum');
  rnum.textContent = score; rnum.style.color = col;

  document.getElementById('ctitle').textContent = name;
  const pill = document.getElementById('rpill');
  pill.className = 'risk-pill '+risk;
  pill.textContent = risk==='low'?'위험도 낮음':risk==='mid'?'위험도 중간':'위험도 높음';
  document.getElementById('cdesc').textContent = getDesc(d, score);

  // 체크리스트
  const items = buildChecks(d, md, gh, age, change24);
  document.getElementById('chks').innerHTML = items.map(c=>`
    <div class="chk">
      <div class="chk-icon ${c.t}">${c.t==='ok'?'✓':c.t==='warn'?'!':'✗'}</div>
      <span>${c.txt}</span>
    </div>`).join('');

  // 메트릭
  const mets = [
    {l:'PRICE (USD)', v: price>0?'$'+fmt(price):'—', cls: change24>0?'up':change24<0?'down':''},
    {l:'24H 변동', v: change24!=null?(change24>0?'+':'')+change24.toFixed(2)+'%':'—', cls: change24>0?'up':change24<0?'down':''},
    {l:'MARKET CAP', v: mc>0?'$'+big(mc):'—', cls:''},
    {l:'VOLUME 24H', v: vol>0?'$'+big(vol):'—', cls:''},
    {l:'7D 변동', v: change7d!=null?(change7d>0?'+':'')+change7d.toFixed(2)+'%':'—', cls: change7d>0?'up':change7d<0?'down':''},
    {l:'GITHUB STARS', v: gh.stars>0?gh.stars.toLocaleString():'비공개', cls:''},
  ];
  document.getElementById('mets').innerHTML = mets.map(m=>`
    <div class="met">
      <div class="met-label">${m.l}</div>
      <div class="met-val ${m.cls}">${m.v}</div>
    </div>`).join('');

  window._sd = {name, score, risk: pill.textContent};
}

function buildChecks(d, md, gh, age, change24){
  const mc = md.market_cap?.usd||0;
  const vol = md.total_volume?.usd||0;
  const volR = mc>0?vol/mc:0;
  const stars = gh.stars||0;
  const items = [];

  items.push(mc>10e9?{t:'ok',txt:`시가총액 $${big(mc)} — 대형 코인, 충분한 규모`}:
             mc>1e9?{t:'ok',txt:`시가총액 $${big(mc)} — 중형 코인`}:
             mc>100e6?{t:'warn',txt:`시가총액 $${big(mc)} — 소형 코인, 변동성 주의`}:
             mc>0?{t:'bad',txt:`시가총액 $${big(mc)} — 극소형 코인, 고위험`}:
             {t:'bad',txt:'시가총액 데이터 없음 — 극초기 또는 비상장'});

  items.push(volR>0.05?{t:'ok',txt:`거래량/시총 비율 ${(volR*100).toFixed(1)}% — 유동성 양호`}:
             volR>0.01?{t:'warn',txt:`거래량/시총 비율 ${(volR*100).toFixed(1)}% — 유동성 보통`}:
             {t:'bad',txt:`유동성 부족 — 대량 매도 시 슬리피지 위험`});

  items.push(stars>5000?{t:'ok',txt:`GitHub ${stars.toLocaleString()} stars — 활발한 개발 커뮤니티`}:
             stars>500?{t:'ok',txt:`GitHub ${stars.toLocaleString()} stars — 개발 진행 중`}:
             stars>0?{t:'warn',txt:`GitHub ${stars} stars — 개발 활동 낮음`}:
             {t:'warn',txt:'GitHub 정보 없음 — 오픈소스 여부 불명확'});

  items.push(age!==null&&age>=5?{t:'ok',txt:`${age}년 이상 운영 — 충분한 트랙레코드`}:
             age!==null&&age>=2?{t:'ok',txt:`${age}년 운영 — 검증 중`}:
             age!==null&&age>=1?{t:'warn',txt:`1~2년 운영 — 비교적 신규 프로젝트`}:
             age!==null?{t:'bad',txt:'1년 미만 — 검증 데이터 부족'}:
             {t:'warn',txt:'출시일 정보 없음'});

  if(change24!=null){
    items.push(Math.abs(change24)<5?{t:'ok',txt:`24시간 변동 ${change24.toFixed(1)}% — 안정적`}:
               Math.abs(change24)<15?{t:'warn',txt:`24시간 변동 ${change24.toFixed(1)}% — 변동성 있음`}:
               {t:'bad',txt:`24시간 변동 ${change24.toFixed(1)}% — 극단적 변동성 주의`});
  }

  items.push(d.links?.homepage?.[0]&&d.links?.whitepaper?
    {t:'ok',txt:'공식 웹사이트 + 백서 확인됨'}:
    d.links?.homepage?.[0]?{t:'warn',txt:'웹사이트 있음, 백서 미확인'}:
    {t:'bad',txt:'공식 웹사이트 없음 — 신뢰도 낮음'});

  return items;
}

function getDesc(d, score){
  const n = d.name;
  if(score>=80) return `${n}은 오랜 역사와 충분한 유동성을 갖춘 검증된 자산이에요. 암호화폐 특성상 변동성은 항상 존재해요.`;
  if(score>=65) return `${n}은 대체로 안정적이지만 일부 지표를 주의해야 해요. 분산 투자를 권장해요.`;
  if(score>=45) return `${n}은 여러 위험 요소가 있어요. 투자 전 충분히 조사하고 소액만 고려하세요.`;
  return `${n}은 다수의 위험 신호가 감지돼요. 투기성이 매우 높으며 원금 손실 가능성이 커요.`;
}

function fmt(n){
  if(n>=1000) return n.toLocaleString('en',{maximumFractionDigits:0});
  if(n>=1) return n.toFixed(2);
  if(n>=0.01) return n.toFixed(4);
  return n.toFixed(8);
}
function big(n){
  if(n>=1e12) return (n/1e12).toFixed(2)+'T';
  if(n>=1e9)  return (n/1e9).toFixed(2)+'B';
  if(n>=1e6)  return (n/1e6).toFixed(2)+'M';
  if(n>=1e3)  return (n/1e3).toFixed(1)+'K';
  return n.toFixed(0);
}

function doShare(){
  const s = window._sd; if(!s) return;
  const t = `${s.name} 코인 안전진단 결과\n\n점수: ${s.score}/100점\n위험도: ${s.risk}\n\nKIBI로 내 코인 안전 점검하기 👇\nhttps://helperpanda.github.io/kibi-coin-check`;
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(t),'_blank');
}

function showLoad(t){ document.getElementById('load').classList.add('show'); setLtxt(t); }
function hideLoad(){ document.getElementById('load').classList.remove('show'); }
function setLtxt(t){ document.getElementById('ltxt').textContent=t; }
function showRes(){ document.getElementById('res').classList.add('show'); }
function hideRes(){ document.getElementById('res').classList.remove('show'); }
function showErr(t){ const e=document.getElementById('err'); e.textContent=t; e.classList.add('show'); }
function hideErr(){ document.getElementById('err').classList.remove('show'); }
