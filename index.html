<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIBI — 코인 안전진단</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--sf:#0f0f1a;--sf2:#16162a;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--t:#eeeef5;--t2:#8888aa;--t3:#44445a;--ac:#6c5ce7;--ac2:#a29bfe;--g:#00cec9;--gb:rgba(0,206,201,0.1);--y:#fdcb6e;--yb:rgba(253,203,110,0.1);--r:#ff7675;--rb:rgba(255,118,117,0.1);--mono:'JetBrains Mono',monospace;--sans:'Pretendard',-apple-system,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:var(--sans);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(108,92,231,0.12),transparent);pointer-events:none;z-index:0;}
.wrap{max-width:560px;margin:0 auto;padding:3rem 1.25rem 4rem;position:relative;z-index:1;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:2.5rem;}
.lm{width:34px;height:34px;background:var(--ac);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;}
.ln{font-size:14px;font-weight:600;}
.ls{font-size:10px;color:var(--t3);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;display:block;}
h1{font-size:clamp(2.2rem,6vw,3.2rem);font-weight:700;line-height:1.1;letter-spacing:-1px;margin-bottom:.75rem;}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:2rem;}
.search{position:relative;margin-bottom:.75rem;}
.search input{width:100%;padding:15px 120px 15px 18px;background:var(--sf);border:1px solid var(--bd2);border-radius:13px;color:var(--t);font-size:15px;font-family:var(--sans);outline:none;transition:border-color .2s,box-shadow .2s;}
.search input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(108,92,231,.15);}
.search input::placeholder{color:var(--t3);}
.search button{position:absolute;right:7px;top:7px;bottom:7px;padding:0 18px;background:var(--ac);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .2s;}
.search button:hover{background:var(--ac2);}
.tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:2rem;}
.tag{padding:5px 13px;background:var(--sf);border:1px solid var(--bd);border-radius:20px;font-size:11px;color:var(--t2);cursor:pointer;font-family:var(--mono);transition:all .15s;}
.tag:hover{border-color:var(--ac);color:var(--ac2);background:rgba(108,92,231,.08);}
.loading{display:none;flex-direction:column;align-items:center;gap:12px;padding:3rem;}
.loading.show{display:flex;}
.spinner{width:32px;height:32px;border:2px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-size:12px;color:var(--t2);font-family:var(--mono);}
.err{display:none;padding:1rem 1.25rem;background:var(--rb);border:1px solid rgba(255,118,117,.2);border-radius:11px;color:var(--r);font-size:13px;margin-bottom:1rem;}
.err.show{display:block;}
.result{display:none;}
.result.show{display:block;animation:up .35s ease;}
@keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:.75rem;}
.srow{display:flex;align-items:center;gap:18px;}
.ring{position:relative;width:80px;height:80px;flex-shrink:0;}
.ring svg{transform:rotate(-90deg);}
.rtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rnum{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1;}
.rden{font-size:9px;color:var(--t3);font-family:var(--mono);}
.sinfo{flex:1;}
.ctitle{font-size:19px;font-weight:700;margin-bottom:5px;}
.rpill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);margin-bottom:5px;}
.rpill.low{background:var(--gb);color:var(--g);}
.rpill.mid{background:var(--yb);color:var(--y);}
.rpill.high{background:var(--rb);color:var(--r);}
.cdesc{font-size:12px;color:var(--t2);line-height:1.55;}
.stitle{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--g);animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.checks{display:flex;flex-direction:column;gap:9px;}
.chk{display:flex;align-items:flex-start;gap:9px;font-size:13px;line-height:1.5;}
.ci{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.ci.ok{background:var(--gb);color:var(--g);}
.ci.warn{background:var(--yb);color:var(--y);}
.ci.bad{background:var(--rb);color:var(--r);}
.mets{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.met{background:var(--sf2);border-radius:10px;padding:11px 13px;}
.ml{font-size:10px;color:var(--t3);font-family:var(--mono);margin-bottom:3px;}
.mv{font-size:14px;font-weight:600;font-family:var(--mono);}
.mv.up{color:var(--g);}
.mv.down{color:var(--r);}
.share{width:100%;padding:13px;background:transparent;border:1px solid var(--bd2);border-radius:11px;color:var(--t);font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-top:.5rem;}
.share:hover{background:var(--sf);border-color:var(--ac);color:var(--ac2);}
.footer{margin-top:2.5rem;padding-top:1.25rem;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.ftxt{font-size:10px;color:var(--t3);font-family:var(--mono);}
.ftxt a{color:var(--ac2);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="lm">K</div>
    <div><div class="ln">KIBI Intelligence</div><span class="ls">Coin Safety Scanner</span></div>
  </div>
  <h1>내 코인,<br><em>안전한가요?</em></h1>
  <p class="sub">코인 이름을 입력하면 시가총액, 유동성, 개발 활동, 변동성을 실시간 분석해드려요.</p>
  <div class="search">
    <input id="inp" placeholder="BTC, Ethereum, PEPE, 솔라나..." onkeydown="if(event.key==='Enter')go()"/>
    <button onclick="go()">진단하기</button>
  </div>
  <div class="tags">
    <div class="tag" onclick="q('bitcoin')">BTC</div>
    <div class="tag" onclick="q('ethereum')">ETH</div>
    <div class="tag" onclick="q('solana')">SOL</div>
    <div class="tag" onclick="q('xrp')">XRP</div>
    <div class="tag" onclick="q('pepe')">PEPE</div>
    <div class="tag" onclick="q('dogecoin')">DOGE</div>
  </div>
  <div class="err" id="err"></div>
  <div class="loading" id="load"><div class="spinner"></div><div class="ltxt" id="ltxt">데이터 조회 중...</div></div>
  <div class="result" id="res">
    <div class="card">
      <div class="srow">
        <div class="ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none" stroke="#16162a" stroke-width="6"/>
            <circle cx="40" cy="40" r="34" fill="none" id="arc" stroke="#6c5ce7" stroke-width="6" stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="214"/>
          </svg>
          <div class="rtxt"><div class="rnum" id="rnum">—</div><div class="rden">/100</div></div>
        </div>
        <div class="sinfo">
          <div class="ctitle" id="ctitle">—</div>
          <div class="rpill low" id="rpill">분석 중</div>
          <div class="cdesc" id="cdesc"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="stitle"><div class="ldot"></div>안전 체크리스트</div>
      <div class="checks" id="chks"></div>
    </div>
    <div class="card">
      <div class="stitle">주요 지표</div>
      <div class="mets" id="mets"></div>
    </div>
    <button class="share" onclick="doShare()">X (트위터)에 결과 공유하기 ↗</button>
  </div>
  <div class="footer">
    <div class="ftxt">© 2026 KIBI Intelligence — 투자 권유 아님</div>
    <div class="ftxt">Powered by <a href="https://coincap.io">CoinCap</a> + <a href="https://gopluslabs.io">GoPlus</a></div>
  </div>
</div>
<script>
// CoinCap ID 매핑 (coincap.io 기준)
const CM={
  'btc':'bitcoin','bitcoin':'bitcoin','비트코인':'bitcoin',
  'eth':'ethereum','ethereum':'ethereum','이더리움':'ethereum',
  'sol':'solana','solana':'solana','솔라나':'solana',
  'xrp':'xrp','ripple':'xrp','리플':'xrp',
  'pepe':'pepe','페페':'pepe',
  'doge':'dogecoin','dogecoin':'dogecoin','도지':'dogecoin',
  'bnb':'binance-coin','binance':'binance-coin',
  'ada':'cardano','cardano':'cardano',
  'avax':'avalanche','avalanche':'avalanche',
  'matic':'matic-network','polygon':'matic-network',
  'link':'chainlink','chainlink':'chainlink',
  'ltc':'litecoin','litecoin':'litecoin',
  'shib':'shiba-inu','shiba':'shiba-inu',
  'dot':'polkadot','polkadot':'polkadot',
  'uni':'uniswap','uniswap':'uniswap',
  'atom':'cosmos','cosmos':'cosmos',
  'sui':'sui','apt':'aptos','aptos':'aptos',
  'trx':'tron','tron':'tron',
};

// GoPlus ERC20 주소
const GP={
  'pepe':'0x6982508145454Ce325dDbE47a25d4ec3d2311933',
  'shiba-inu':'0x95aD61b0a150d79219dCF64E1E6Cc01f0B64C4cE',
  'uniswap':'0x1f9840a85d5aF5bf1D1762F925BDADdC4201F984',
  'chainlink':'0x514910771AF9Ca656af840dff83E8264EcF986CA',
};

function q(id){document.getElementById('inp').value=id;go();}

async function go(){
  const raw=document.getElementById('inp').value.trim().toLowerCase();
  if(!raw) return;
  showLoad('데이터 조회 중...'); hideErr(); hideRes();
  try{
    const coinId = CM[raw] || raw;
    setLtxt(`${coinId} 분석 중...`);

    // CoinCap API - 빠르고 무료
    const r = await fetch(`https://api.coincap.io/v2/assets/${coinId}`);
    if(!r.ok){
      // 검색 시도
      const sr = await fetch(`https://api.coincap.io/v2/assets?search=${encodeURIComponent(raw)}&limit=1`);
      const sd = await sr.json();
      if(!sd.data||!sd.data.length) throw new Error('코인을 찾을 수 없어요. 영문 이름으로 검색해주세요.');
      const found = sd.data[0];
      renderFromCoinCap(found, null);
      hideLoad(); showRes(); return;
    }
    const data = await r.json();
    if(!data.data) throw new Error('데이터를 불러올 수 없어요.');

    // GoPlus (선택적)
    let gpData=null;
    const gpAddr=GP[coinId];
    if(gpAddr){
      setLtxt('보안 분석 중...');
      try{
        const gpr=await fetch(`https://api.gopluslabs.io/api/v1/token_security/1?contract_addresses=${gpAddr}`);
        const gpj=await gpr.json();
        gpData=gpj.result?.[gpAddr.toLowerCase()]||null;
      }catch(e){}
    }

    renderFromCoinCap(data.data, gpData);
    hideLoad(); showRes();
  }catch(e){hideLoad();showErr(e.message||'오류가 발생했어요. 잠시 후 다시 시도해주세요.');}
}

function renderFromCoinCap(d, gpData){
  const price=parseFloat(d.priceUsd)||0;
  const mc=parseFloat(d.marketCapUsd)||0;
  const vol=parseFloat(d.volumeUsd24Hr)||0;
  const ch24=parseFloat(d.changePercent24Hr)||0;
  const supply=parseFloat(d.supply)||0;
  const maxSupply=parseFloat(d.maxSupply)||0;
  const rank=parseInt(d.rank)||999;
  const name=`${d.name} (${(d.symbol||'').toUpperCase()})`;

  const score=calcScore({mc,vol,ch24,rank,gpData,supply,maxSupply});
  const risk=score>=70?'low':score>=45?'mid':'high';
  const col=risk==='low'?'#00cec9':risk==='mid'?'#fdcb6e':'#ff7675';

  const arc=document.getElementById('arc');
  arc.style.stroke=col; arc.style.strokeDashoffset=214-(score/100)*214;
  const rnum=document.getElementById('rnum');
  rnum.textContent=score; rnum.style.color=col;
  document.getElementById('ctitle').textContent=name;
  const pill=document.getElementById('rpill');
  pill.className='rpill '+risk;
  pill.textContent=risk==='low'?'위험도 낮음':risk==='mid'?'위험도 중간':'위험도 높음';
  document.getElementById('cdesc').textContent=getDesc(d.name,score);

  // 체크리스트
  const vr=mc>0?vol/mc:0;
  const items=[];
  items.push(rank<=10?{t:'ok',txt:`시가총액 순위 ${rank}위 ($${big(mc)}) — 최상위 코인`}:
    rank<=50?{t:'ok',txt:`시가총액 순위 ${rank}위 ($${big(mc)}) — 상위권 코인`}:
    rank<=200?{t:'warn',txt:`시가총액 순위 ${rank}위 ($${big(mc)}) — 중소형 코인`}:
    mc>0?{t:'bad',txt:`시가총액 순위 ${rank}위 ($${big(mc)}) — 소형 코인 주의`}:
    {t:'bad',txt:'시가총액 데이터 없음'});

  items.push(vr>0.05?{t:'ok',txt:`거래량/시총 ${(vr*100).toFixed(1)}% — 유동성 양호`}:
    vr>0.01?{t:'warn',txt:`거래량/시총 ${(vr*100).toFixed(1)}% — 유동성 보통`}:
    {t:'bad',txt:'유동성 부족 — 대량 매도 시 슬리피지 위험'});

  items.push(Math.abs(ch24)<3?{t:'ok',txt:`24시간 변동 ${ch24.toFixed(2)}% — 안정적`}:
    Math.abs(ch24)<10?{t:'warn',txt:`24시간 변동 ${ch24.toFixed(2)}% — 변동성 있음`}:
    Math.abs(ch24)<20?{t:'warn',txt:`24시간 변동 ${ch24.toFixed(2)}% — 높은 변동성`}:
    {t:'bad',txt:`24시간 변동 ${ch24.toFixed(2)}% — 극단적 변동성 주의`});

  if(maxSupply>0){
    const ratio=supply/maxSupply;
    items.push(ratio>0.7?{t:'ok',txt:`유통량 ${(ratio*100).toFixed(0)}% — 물량 잠금 리스크 낮음`}:
      ratio>0.4?{t:'warn',txt:`유통량 ${(ratio*100).toFixed(0)}% — 추가 물량 해제 가능성`}:
      {t:'bad',txt:`유통량 ${(ratio*100).toFixed(0)}% — 대량 물량 잠금, 덤핑 주의`});
  }

  if(gpData){
    if(gpData.is_honeypot==='1') items.push({t:'bad',txt:'⚠️ 허니팟 감지 — 출금 불가 함정 코인!'});
    else items.push({t:'ok',txt:'허니팟 없음 — 출금 가능 확인'});
    if(gpData.is_open_source==='1') items.push({t:'ok',txt:'오픈소스 코드 검증됨'});
    if(gpData.can_take_back_ownership==='1') items.push({t:'bad',txt:'소유권 회수 가능 — 중앙화 위험'});
  }

  document.getElementById('chks').innerHTML=items.map(c=>
    `<div class="chk"><div class="ci ${c.t}">${c.t==='ok'?'✓':c.t==='warn'?'!':'✗'}</div><span>${c.txt}</span></div>`
  ).join('');

  // 메트릭
  const mets=[
    {l:'PRICE (USD)',v:'$'+fmt(price),c:ch24>0?'up':ch24<0?'down':''},
    {l:'24H 변동',v:(ch24>0?'+':'')+ch24.toFixed(2)+'%',c:ch24>0?'up':ch24<0?'down':''},
    {l:'MARKET CAP',v:mc>0?'$'+big(mc):'—',c:''},
    {l:'VOLUME 24H',v:vol>0?'$'+big(vol):'—',c:''},
    {l:'시가총액 순위',v:rank<900?'#'+rank:'—',c:''},
    {l:'유통 공급량',v:supply>0?big(supply):'—',c:''},
  ];
  document.getElementById('mets').innerHTML=mets.map(m=>
    `<div class="met"><div class="ml">${m.l}</div><div class="mv ${m.c}">${m.v}</div></div>`
  ).join('');

  window._sd={name,score,risk:pill.textContent};
}

function calcScore({mc,vol,ch24,rank,gpData,supply,maxSupply}){
  let s=50;
  if(rank<=5) s+=30; else if(rank<=20) s+=22; else if(rank<=50) s+=15;
  else if(rank<=100) s+=8; else if(rank<=200) s+=3; else if(rank>500) s-=10;

  const vr=mc>0?vol/mc:0;
  if(vr>0.1) s+=15; else if(vr>0.05) s+=10; else if(vr>0.02) s+=5; else if(vr<0.005&&mc>0) s-=10;

  if(Math.abs(ch24)>30) s-=15; else if(Math.abs(ch24)>15) s-=8; else if(Math.abs(ch24)>8) s-=3;

  if(maxSupply>0){const r=supply/maxSupply; if(r>0.7) s+=5; else if(r<0.3) s-=8;}

  if(gpData){
    if(gpData.is_honeypot==='1') s-=40;
    if(gpData.is_open_source==='1') s+=5;
    if(gpData.can_take_back_ownership==='1') s-=15;
    if(gpData.is_blacklisted==='1') s-=10;
  }
  return Math.max(5,Math.min(97,Math.round(s)));
}

function getDesc(name,score){
  if(score>=80) return `${name}은 검증된 상위권 자산이에요. 암호화폐 특성상 변동성은 항상 존재해요.`;
  if(score>=65) return `${name}은 대체로 안정적이지만 일부 지표를 주의해야 해요.`;
  if(score>=45) return `${name}은 여러 위험 요소가 있어요. 소액 분산 투자를 권장해요.`;
  return `${name}은 위험 신호가 감지돼요. 투기성이 높으며 원금 손실 가능성이 커요.`;
}

function fmt(n){
  if(n>=1000) return n.toLocaleString('en',{maximumFractionDigits:0});
  if(n>=1) return n.toFixed(2);
  if(n>=0.01) return n.toFixed(4);
  return n.toFixed(8);
}
function big(n){
  if(n>=1e12) return (n/1e12).toFixed(2)+'T';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(0);
}
function doShare(){
  const s=window._sd; if(!s) return;
  const t=`${s.name} 코인 안전진단 결과\n\n점수: ${s.score}/100점\n위험도: ${s.risk}\n\nKIBI로 내 코인 점검하기 👇\nhttps://helperpanda.github.io/kibi-coin-check`;
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(t),'_blank');
}
function showLoad(t){document.getElementById('load').classList.add('show');setLtxt(t);}
function hideLoad(){document.getElementById('load').classList.remove('show');}
function setLtxt(t){document.getElementById('ltxt').textContent=t;}
function showRes(){document.getElementById('res').classList.add('show');}
function hideRes(){document.getElementById('res').classList.remove('show');}
function showErr(t){const e=document.getElementById('err');e.textContent=t;e.classList.add('show');}
function hideErr(){document.getElementById('err').classList.remove('show');}
</script>
</body>
</html>
